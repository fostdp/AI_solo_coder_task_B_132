<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代水运仪象台漏壶水力精度仿真系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-bottom: 2px solid #c9a227;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            color: #c9a227;
            text-shadow: 0 0 10px rgba(201, 162, 39, 0.5);
        }

        .header .subtitle {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #44ff44;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .canvas-container {
            flex: 1;
            position: relative;
        }

        #three-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .side-panel {
            width: 420px;
            background: rgba(0, 0, 0, 0.5);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 4px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab-btn:hover { color: #ccc; }
        .tab-btn.active {
            color: #c9a227;
            border-bottom-color: #c9a227;
            background: rgba(201,162,39,0.1);
            font-weight: bold;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: none;
        }
        .tab-content.active { display: block; }

        .panel-block {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .panel-title {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: bold;
            color: #e5e7eb;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .panel-icon { margin-right: 6px; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .panel-section {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(201, 162, 39, 0.2);
        }

        .panel-section h3 {
            color: #c9a227;
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.3);
        }

        .clepsydra-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #c9a227;
        }

        .clepsydra-card.warning {
            border-left-color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
        }

        .clepsydra-card.critical {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            animation: alertPulse 1s infinite;
        }

        @keyframes alertPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 68, 68, 0.8); }
        }

        .clepsydra-name {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            font-size: 12px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
        }

        .data-label {
            color: #888;
        }

        .data-value {
            color: #c9a227;
            font-family: 'Courier New', monospace;
        }

        .water-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .water-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e90ff, #00bfff);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(30, 144, 255, 0.5);
        }

        .alert-panel {
            max-height: 200px;
            overflow-y: auto;
        }

        .alert-item {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .alert-item.warning {
            background: rgba(255, 170, 0, 0.2);
            border-color: #ffaa00;
        }

        .alert-time {
            color: #888;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .alert-message {
            color: #fff;
        }

        .metrics-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 12px;
            border-bottom: 1px dashed #333;
        }

        .metrics-row:last-child {
            border-bottom: none;
        }

        .metrics-label {
            color: #aaa;
        }

        .metrics-value {
            color: #00bfff;
            font-family: 'Courier New', monospace;
        }

        .metrics-value.error {
            color: #ff6666;
        }

        .metrics-value.good {
            color: #66ff66;
        }

        .control-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            background: rgba(201, 162, 39, 0.2);
            border: 1px solid #c9a227;
            color: #c9a227;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(201, 162, 39, 0.4);
        }

        .btn.active {
            background: #c9a227;
            color: #000;
        }

        .compensation-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .compensation-badge.positive {
            background: rgba(0, 255, 0, 0.2);
            color: #66ff66;
        }

        .compensation-badge.negative {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6666;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(201, 162, 39, 0.4);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(201, 162, 39, 0.6);
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🏛️ 古代水运仪象台 - 漏壶水力精度仿真系统</h1>
            <div class="subtitle">宋代苏颂水运仪象台四级漏壶复原研究 | 水力仿真 · 误差补偿 · 实时监测</div>
        </div>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
        </div>
    </div>

    <div class="main-container">
        <div class="canvas-container">
            <canvas id="three-canvas"></canvas>
        </div>

        <div class="side-panel">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="tab-live">📡 实时监测</button>
                <button class="tab-btn" data-tab="tab-dynasty">⚔️ 朝代对比</button>
                <button class="tab-btn" data-tab="tab-cross">⏱️ 跨时代</button>
                <button class="tab-btn" data-tab="tab-et">🔗 误差传递</button>
                <button class="tab-btn" data-tab="tab-vo">🎮 虚拟操作</button>
            </div>

            <div class="tab-content active" id="tab-live">
                <div class="panel-section">
                    <h3>📊 系统状态</h3>
                    <div class="control-panel">
                        <button class="btn active" id="btnRotate">自动旋转</button>
                        <button class="btn" id="btnParticles">水流粒子</button>
                        <button class="btn active" id="btnLabels">水位标注</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>⏱️ 日计时误差</h3>
                    <div id="dailyErrorPanel" style="font-size: 24px; text-align: center; color: #66ff66; font-family: 'Courier New', monospace; padding: 10px;">
                        0.00 秒
                    </div>
                    <div style="font-size: 12px; color: #888; text-align: center;">
                        目标: 小于60秒 / 日
                    </div>
                </div>

                <div class="panel-section">
                    <h3>🏺 四级漏壶状态</h3>
                    <div id="clepsydraList"></div>
                </div>

                <div class="panel-section">
                    <h3>📐 水力精度指标</h3>
                    <div id="metricsPanel">
                        <div class="metrics-row">
                            <span class="metrics-label">理论流量</span>
                            <span class="metrics-value" id="metricTheoretical">- mL/s</span>
                        </div>
                        <div class="metrics-row">
                            <span class="metrics-label">实际流量</span>
                            <span class="metrics-value" id="metricActual">- mL/s</span>
                        </div>
                        <div class="metrics-row">
                            <span class="metrics-label">流量误差</span>
                            <span class="metrics-value error" id="metricError">- %</span>
                        </div>
                        <div class="metrics-row">
                            <span class="metrics-label">蒸发速率</span>
                            <span class="metrics-value" id="metricEvap">- mL/s</span>
                        </div>
                        <div class="metrics-row">
                            <span class="metrics-label">PID补偿量</span>
                            <span class="metrics-value" id="metricComp">-</span>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>🚨 告警信息</h3>
                    <div class="alert-panel" id="alertPanel">
                        <div style="color: #666; font-size: 12px; text-align: center; padding: 20px;">
                            暂无告警
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-dynasty">
                <div id="dynasty-compare-panel"></div>
            </div>

            <div class="tab-content" id="tab-cross">
                <div id="cross-era-panel"></div>
            </div>

            <div class="tab-content" id="tab-et">
                <div id="error-transfer-panel"></div>
            </div>

            <div class="tab-content" id="tab-vo">
                <div id="virtual-operate-panel"></div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script src="./js/feature_panels.js"></script>
    <script type="module">
        import { Clepsydra3D } from './js/clepsydra_3d.js';
        import { PrecisionPanel } from './js/precision_panel.js';

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tab));
                if (tab === 'tab-cross') {
                    if (window._crossEraPanel) window._crossEraPanel.load();
                } else if (tab === 'tab-et') {
                    if (window._etPanel) window._etPanel.analyze();
                }
            });
        });

        const canvas = document.getElementById('three-canvas');
        const scene3d = new Clepsydra3D(canvas);
        const panel = new PrecisionPanel();

        panel.setCallbacks({
            onSensorUpdate: (id, levelRatio, flowRate) => {
                scene3d.updateWaterLevel(id, levelRatio);
                scene3d.setParticleFlow(id, flowRate / 2.5);
            },
        });

        const apiBase = window.location.origin;
        window._dynastyComparePanel = new DynastyComparePanel('dynasty-compare-panel', apiBase);
        window._crossEraPanel = new CrossEraComparePanel('cross-era-panel', apiBase);
        window._etPanel = new ErrorTransferPanel('error-transfer-panel', apiBase);
        window._voPanel = new VirtualOperatePanel('virtual-operate-panel', apiBase, scene3d);

        document.getElementById('btnRotate').addEventListener('click', function () {
            scene3d.setAutoRotate(!scene3d.autoRotate);
            this.classList.toggle('active', scene3d.autoRotate);
        });

        document.getElementById('btnParticles').addEventListener('click', function () {
            scene3d.setShowParticles(!scene3d.showParticles);
            this.classList.toggle('active', scene3d.showParticles);
        });

        document.getElementById('btnLabels').addEventListener('click', function () {
            scene3d.setLabelsVisible(!scene3d.showLabels);
            this.classList.toggle('active', scene3d.showLabels);
        });

        panel.updateUI();
        panel.updateAlerts();
        panel.connectWebSocket();
        scene3d.start();

        panel.startSimulationFallback();
    </script>
</body>
</html>
