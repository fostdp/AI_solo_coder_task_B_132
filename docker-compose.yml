services:
  emqx:
    image: emqx/emqx:5.7
    container_name: clepsydra-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    environment:
      - EMQX_NAME=clepsydra
      - EMQX_ALLOW_ANONYMOUS=true
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - clepsydra-net
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clepsydra-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=clepsydra
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - clepsydra-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clepsydra-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - APP_CONFIG=/app/config/app_config.json
      - CLICKHOUSE_URL=http://clickhouse:8123
      - MQTT_BROKER=emqx
    depends_on:
      clickhouse:
        condition: service_healthy
      emqx:
        condition: service_started
    volumes:
      - ./backend/config:/app/config:ro
    networks:
      - clepsydra-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clepsydra-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clepsydra-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: clepsydra-simulator
    restart: unless-stopped
    command: ["--broker", "emqx", "--interval", "1", "--altitude", "0"]
    environment:
      - SIM_ALTITUDE=0
      - SIM_WATER_TEMP=20
      - SIM_ABNORMAL_WATER_LEVEL=false
      - SIM_ABNORMAL_INTERVAL=300
    depends_on:
      emqx:
        condition: service_started
    networks:
      - clepsydra-net

volumes:
  emqx_data:
  clickhouse_data:

networks:
  clepsydra-net:
    driver: bridge
